<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enspec Power VR Showcase</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        touch-action: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #0a0a0f;
        color: rgba(200, 210, 220, 0.85);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.3px;
        z-index: 100;
        transition: opacity 0.6s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loadingBarTrack {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      #loadingBarFill {
        width: 0%;
        height: 100%;
        background: rgba(0, 200, 240, 0.7);
        border-radius: 2px;
        transition: width 0.3s ease-out;
      }

      /* ── Enter VR Button ─────────────────────────────── */
      #enterVR {
        display: none; /* shown by JS when WebXR is available */
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        padding: 14px 32px;
        border: 1px solid rgba(0, 200, 240, 0.4);
        border-radius: 40px;
        background: rgba(8, 12, 24, 0.85);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        user-select: none;
        -webkit-user-select: none;
      }
      #enterVR:hover {
        background: rgba(0, 80, 120, 0.7);
        border-color: rgba(0, 220, 255, 0.6);
      }
      #enterVR:active {
        transform: translateX(-50%) scale(0.97);
      }
      #enterVR svg {
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
        width: 22px;
        height: 22px;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="loading">
      <span id="loadingText">Loading model...</span>
      <div id="loadingBarTrack"><div id="loadingBarFill"></div></div>
    </div>

    <button id="enterVR" aria-label="Enter VR">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="3"/>
        <path d="M10 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
        <path d="M18 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
        <path d="M10 12h4"/>
      </svg>
      Enter VR
    </button>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
